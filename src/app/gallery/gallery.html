<section id="instagram" class="py-28 bg-beige">
  <div class="max-w-6xl mx-auto px-6">

    <!-- HEADER -->
    <div class="text-center max-w-2xl mx-auto mb-8 lg:mb-16">
      <p class="uppercase tracking-widest text-sm text-gray-500">Instagram</p>
      <h2 class="mt-4 text-4xl md:text-5xl font-semibold">Video Blog - Bądź na bieżąco</h2>
      <p class="mt-6 text-gray-600 text-lg">
        Zobacz nasze najnowsze filmy i rolki z poradami, trendami i zabiegami.
      </p>
    </div>

    <!-- KARUZELA / REELS -->
    <div class="flex gap-6 overflow-x-auto scrollbar-hide snap-x snap-mandatory">
      @for (reel of reels; track reel) {
        <div
          class="shrink-0 w-full sm:w-75 md:w-75 lg:w-87.5 h-160 rounded-3xl shadow-lg overflow-hidden snap-start relativep-8 hover:shadow-2xl transition-all duration-300 hover:-translate-y-2">
          <iframe
            [src]="reel | safeUrl"
            class="w-full h-full"
            allowfullscreen
            scrolling="no"
          ></iframe>
        </div>
      }
    </div>

  </div>

  <p class="text-center mt-6 text-sm text-gray-400 mb-4 sm:hidden">
    Przesuń w prawo →
  </p>

</section>
