<header
  class="fixed top-0 left-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 my-font my-font-nav">

  <div class="max-w-6xl mx-auto px-6">

    <div class="flex items-center justify-between h-24">

      <!-- LOGO -->
      <a href="#home" class="flex items-center tracking-tight animate-logo-reveal" aria-label="Strona główna">
        <img
          src="assets/LOGO.png"
          alt="Logo gabinetu kosmetologii"
          class="h-32 w-auto object-contain transition-all duration-200 ease-in-out hover:drop-shadow-xl"
        />
      </a>

      <!-- DESKTOP MENU -->
      <nav class="hidden md:flex items-center gap-16 text-l">

        <a href="#about" class="hover:text-accent transition">
          O gabinecie
        </a>

        <a href="#services" class="hover:text-accent transition">
          Zabiegi
        </a>

        <a href="#gallery" class="hover:text-accent transition">
          Video Blog
        </a>

        <a href="#localization" class="hover:text-accent transition">
          Lokalizacja
        </a>

        <a href="#footer" class="hover:text-accent transition">
          Kontakt
        </a>

        <a
          href="https://app.wellmify.com/pl/szrensk/luna-kosmetologia"
          class="bg-accent text-white font-semibold px-4 py-2 rounded-4xl hover:opacity-80 transition">
          Umów wizytę
        </a>

      </nav>

      <button (click)="toggleMenu()" class="md:hidden text-amber-700">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M4 6h16M4 12h16m-7 6h7"/>
        </svg>
      </button>

    </div>

  </div>

  <!-- MOBILE MENU -->
  @if (menuOpen) {
    <div class="md:hidden bg-white/95 backdrop-blur-xl border-t border-amber-50">
      <div class="flex flex-col p-8 gap-6 text-center">
        <a (click)="closeMenu()" href="#about"
           class="tracking-widest text-sm text-gray-700">O gabinecie</a>
        <a (click)="closeMenu()" href="#services"
           class="tracking-widest text-sm text-gray-700">Zabiegi</a>
        <a (click)="closeMenu()" href="#gallery"
           class="tracking-widest text-sm text-gray-700">Galeria</a>
        <a (click)="closeMenu()" href="#localization"
           class="tracking-widest text-sm text-gray-700">Lokalizacja</a>
        <a (click)="closeMenu()" href="#footer"
           class="tracking-widest text-sm text-gray-700">Kontakt</a>
        <a
          (click)="closeMenu()"
          href="https://app.wellmify.com/pl/szrensk/luna-kosmetologia"
          class="tracking-widest bg-accent text-white py-4 rounded-full font-bold">
          Umów wizytę
        </a>
      </div>
    </div>
  }

</header>
